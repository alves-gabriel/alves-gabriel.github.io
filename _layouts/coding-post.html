---
layout: default
mathjax: true
---
<div class="container">
  <div class="row">
    <div class="col-md-3">
      <aside id="code_sidebar">
        <p><b>{{ page.section }}</b></p>
        <hr>
        {% assign section_items = site.coding | where: "section", page.section | sort: "order" %}
        <ul class="sidebar_list">
          {% for item in section_items %}
            <li {% if item.url == page.url %}class="active"{% endif %}>
              <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
            </li>
          {% endfor %}
          <li class="back-link"><a href="{{ '/coding.html' | relative_url }}"><i class="fa fa-arrow-left" aria-hidden="true"></i> Back</a></li>
        </ul>
      </aside>
    </div>
    <article class="col-md-9 content-column">
      <h1><b>{{ page.title }}</b></h1>
      <hr>
      {{ content }}
    </article>
  </div>
</div>

  html: 'Our <a class="std" href="https://journals.aps.org/pra/abstract/10.1103/PhysRevA.110.052421">work on on collisional thermometry for Gaussian systems</a> has been published at PRA. This was a collaboration with Marcelo A. F. Santos and my masters supervisor Gabriel Landi.'
- date: "01/2024"
  html: 'Our conference paper on <a class="std" href="https://link.springer.com/chapter/10.1007/978-3-031-49401-7_57">the Development of a Low-Cost Video Laryngoscope</a> just came out. This was a collaboration with the brilliant Roberto Ceccato and the team at the Albert Einstein Hospital in São Paulo.'
